[project]
name = "financial-stress-testing-platform"
description = "A comprehensive blockchain-based platform for financial stress testing and systemic risk monitoring"
authors = ["Alex Thompson <alex.thompson.dev@example.com>"]
telemetry = true
cache_dir = "./.cache"

[contracts.risk-assessment]
path = "contracts/risk-assessment.clar"

[contracts.scenario-modeler]
path = "contracts/scenario-modeler.clar"

[contracts.interconnectedness-analyzer]
path = "contracts/interconnectedness-analyzer.clar"

[contracts.capital-optimizer]
path = "contracts/capital-optimizer.clar"

[contracts.crisis-simulator]
path = "contracts/crisis-simulator.clar"

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }
